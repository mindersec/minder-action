name: mindev-test-runner
author: mindersec
description: 'Downloads mindev and runs mindev test against the provided directory'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  release:
    description: 'mindev release version to be installed (e.g., v0.2.2 or latest)'
    required: false
    default: 'v0.2.2'
  rules-directory:
    description: 'Directory containing the rules and tests to run'
    required: false
    default: '.'
  install-dir:
    description: 'Where to install the mindev binary'
    required: false
    default: '$HOME/.mindev'
outputs:
  junit-artifact-id:
    description: GitHub ID of uploaded JUnit XML artifact.
    value: ${{ steps.upload-results.outputs.artifact-id }}
  junit-artifact-url:
    description: URL to download JUnit XML artifact.  Must be logged in for this URL to work.
    value: ${{ steps.upload-results.outputs.artifact-url }}
  junit-artifact-digest:
    description: SHA-256 digest of the JUnit XML result.
    value: ${{ steps.upload-results.outputs.artifact-url }}
  junit-filename:
    description: Filesystem path to the JUnixt XML result.
    value: ${{ steps.run-test.outputs.test-results }}
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.2

    - name: Install and validate CLI
      uses: mindersec/minder-client-installer@v1.1.0
      with:
        release: ${{ inputs.release }}
        install-dir: ${{ inputs.install-dir }}

    - name: Run mindev test
      id: run-test
      shell: bash
      env:
        RULES_DIRECTORY: ${{ inputs.rules-directory }}
      run: |
        echo "Running mindev test..."
        mindev test -d "$RULES_DIRECTORY" -o junit > test-results.xml
        echo "test-results=test-results.xml" >> $GITHUB_OUTPUT
        echo "Test results written to test-results.xml"

    - name: Upload test results
      id: upload-results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results
        path: test-results.*
