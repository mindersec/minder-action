name: mindev-test-runner
author: mindersec
description: 'Downloads mindev and runs mindev test against the provided directory'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  minder_version:
    description: 'mindev release version to be installed (e.g., v0.1.3 or latest)'
    required: false
    default: 'latest'
  rules_directory:
    description: 'Directory containing the rules and tests to run'
    required: false
    default: '.'
  install_dir:
    description: 'Where to install the mindev binary temporarily'
    required: false
    default: '$HOME/.mindev'
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.6.0
    - name: Install and run mindev
      shell: bash
      run: |
        #!/bin/bash
        shopt -s expand_aliases
        if [ -z "$NO_COLOR" ]; then
          alias log_info="echo -e \"\033[1;32mINFO\033[0m:\""
          alias log_error="echo -e \"\033[1;31mERROR\033[0m:\""
        else
          alias log_info="echo \"INFO:\""
          alias log_error="echo \"ERROR:\""
        fi
        set -e

        # We evaluate the install_dir in case it has variables like $HOME
        eval INSTALL_DIR="${{ inputs.install_dir }}"
        mkdir -p "$INSTALL_DIR"
        cd "$INSTALL_DIR"

        release_version="${{ inputs.minder_version }}"
        if [[ "$release_version" == 'latest' ]]; then
          log_info "Fetching latest release version..."
          release_version="$(curl -s https://api.github.com/repos/mindersec/minder/releases/latest | jq -r '.tag_name')"
        fi

        release_number="$(echo "$release_version" | sed 's/v//')"

        # Determine file name based on OS and architecture
        case ${{ runner.os }} in
          Linux|linux)
            case ${{ runner.arch }} in
              X64|amd64) desired_minder_filename="minder_${release_number}_linux_amd64" ;;
              ARM64|arm64) desired_minder_filename="minder_${release_number}_linux_arm64" ;;
              *) log_error "unsupported architecture ${{ runner.arch }}"; exit 1 ;;
            esac
            ;;
          *)
            log_error "unsupported OS ${{ runner.os }}. Currently only Linux runners are supported."; exit 1 ;;
        esac

        compression_extension=".tar.gz"

        # Download the release tarball, signature, and PEM
        curl -fsL "https://github.com/mindersec/minder/releases/download/${release_version}/${desired_minder_filename}${compression_extension}" -o "${desired_minder_filename}${compression_extension}"
        curl -fsL "https://github.com/mindersec/minder/releases/download/${release_version}/${desired_minder_filename}${compression_extension}.sig" -o "${desired_minder_filename}${compression_extension}.sig"
        curl -fsL "https://github.com/mindersec/minder/releases/download/${release_version}/${desired_minder_filename}.pem" -o "${desired_minder_filename}.pem"

        # Verify the signature
        log_info "Verifying signature of release tarball"
        cosign verify-blob \
          --certificate "${desired_minder_filename}.pem" \
          --certificate-identity "https://github.com/mindersec/minder/.github/workflows/releaser.yml@refs/tags/${release_version}" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
          --signature "${desired_minder_filename}${compression_extension}.sig" \
          "${desired_minder_filename}${compression_extension}"

        # Extract mindev
        log_info "Extracting mindev..."
        tar -xzf "${desired_minder_filename}${compression_extension}"

        chmod +x mindev
        log_info "Installation complete!"

    - name: Add mindev to PATH
      run: |
        eval INSTALL_DIR="${{ inputs.install_dir }}"
        echo "$INSTALL_DIR" >> $GITHUB_PATH
      shell: bash

    - name: Run mindev test
      shell: bash
      run: |
        echo "Running mindev test..."
        mindev test -d "${{ inputs.rules_directory }}" -o junit > test-results.xml
        echo "Test results written to test-results.xml"
